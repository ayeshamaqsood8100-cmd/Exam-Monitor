<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markaz Dashboard - Aesthetics Redefined</title>
    <!-- Beautiful, clean sans-serif -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=SF+Pro+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Modern CSS reset */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            /* Deeper, more sophisticated dark background */
            --bg: #0A0A0B; 
            
            /* Clean, slightly elevated surfaces */
            --surface: rgba(255, 255, 255, 0.03);
            --surface-hover: rgba(255, 255, 255, 0.05);
            
            /* Crisp, barely-there borders */
            --border: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.12);
            
            /* Professional Typography */
            --text-primary: #FAFAFA;
            --text-secondary: #A1A1AA;
            --text-muted: #52525B;
            
            /* Vibrant, tasteful accents */
            --accent-cyan: #06B6D4;
            --accent-purple: #8B5CF6;
            --accent-pink: #EC4899;
            
            /* Gradients */
            --gradient-subtle: linear-gradient(135deg, rgba(6, 182, 212, 0.1), rgba(139, 92, 246, 0.1));
            
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.5;
            position: relative;
            overflow-x: hidden;
        }

        /* 
         * The aesthetic touch: A very faint, large, blurred gradient in the top right.
         * It breaks the pure blackness without being distracting or "sci-fi".
         */
        body::before {
            content: '';
            position: absolute;
            top: -20vh;
            right: -10vw;
            width: 50vw;
            height: 50vh;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.08) 0%, rgba(6, 182, 212, 0.05) 50%, transparent 80%);
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            pointer-events: none;
        }

        /* Clean, frosted glass navigation */
        nav {
            position: sticky;
            top: 0;
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 40px;
            background: rgba(10, 10, 11, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 50;
        }

        .logo {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-primary);
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: white;
            box-shadow: 0 2px 10px rgba(139, 92, 246, 0.3);
        }

        .nav-links {
            margin-left: 48px;
            display: flex;
            gap: 32px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .nav-links a:hover {
            color: var(--text-primary);
        }

        .nav-links a.active {
            color: var(--text-primary);
            position: relative;
        }

        .nav-links a.active::after {
            content: '';
            position: absolute;
            bottom: -22px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent-cyan);
            border-radius: 2px 2px 0 0;
            box-shadow: 0 -2px 8px rgba(6, 182, 212, 0.4);
        }

        /* Main Content Layout */
        main {
            max-width: 1040px;
            margin: 0 auto;
            padding: 56px 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.03em;
            color: var(--text-primary);
        }

        /* Beautiful, modern primary button */
        .btn-primary {
            background: var(--text-primary);
            color: var(--bg);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
        }

        /* The Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        /* 
         * The Cards
         * Very clean, minimal framing, but highly polished.
         */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* Subtle gradient hint at the top of the card */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            opacity: 0.3;
            transition: opacity 0.3s ease;
        }

        .card:hover {
            background: var(--surface-hover);
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
        }

        .card:hover::before {
            opacity: 0.8;
        }

        /* Card Header */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .exam-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .exam-class {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .exam-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.3;
            letter-spacing: -0.01em;
        }

        /* 
         * Status Badge
         * Clean framing with a vibrant dot. No crazy animations.
         */
        .badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.02em;
        }

        .badge-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-cyan);
            box-shadow: 0 0 10px var(--accent-cyan);
        }

        /* Card Data Section */
        .card-data {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .data-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .data-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .data-value {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            font-feature-settings: "tnum"; /* Tabular numbers for clean data */
        }

        /* Subtle highlight for important data */
        .data-value.highlight {
            color: var(--accent-cyan);
            text-shadow: 0 0 12px rgba(6, 182, 212, 0.3);
        }

        /* Actions */
        .card-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 24px;
        }

        .btn-text {
            background: transparent;
            border: none;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .btn-danger {
            color: var(--text-muted);
        }

        .btn-danger:hover {
            color: var(--accent-pink);
        }

        .btn-secondary {
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-secondary:hover {
            color: var(--accent-purple);
        }

        /* Small visual progress indicator */
        .progress-track {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            margin-top: 6px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            border-radius: 3px;
        }

    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <div class="logo-icon">M</div>
            Markaz
        </div>
        <div class="nav-links">
            <a href="#" class="active">Surveillance</a>
            <a href="#">Sessions</a>
            <a href="#">Flags</a>
        </div>
    </nav>

    <main>
        <div class="header">
            <h1>Active Configurations</h1>
            <button class="btn-primary">
                Deploy Exam
            </button>
        </div>

        <div class="grid">
            
            <!-- Exam 1 -->
            <div class="card">
                <div class="card-header">
                    <div class="exam-info">
                        <span class="exam-class">BS-CS Section A</span>
                        <h2 class="exam-title">Object Oriented Programming</h2>
                    </div>
                    <div class="badge">
                        <div class="badge-dot"></div>
                        Live
                    </div>
                </div>

                <div class="card-data">
                    <div class="data-item">
                        <span class="data-label">Window</span>
                        <span class="data-value">09:00 AM — 12PK</span>
                    </div>
                    <div class="data-item">
                        <span class="data-label">Keys</span>
                        <span class="data-value highlight">OOP24</span>
                    </div>
                    <div class="data-item" style="grid-column: span 2;">
                        <span class="data-label">Telemetry Links (42/50)</span>
                        <div class="progress-track">
                            <div class="progress-fill" style="width: 84%;"></div>
                        </div>
                    </div>
                </div>

                <div class="card-actions">
                    <button class="btn-text btn-danger">End Deployment</button>
                    <button class="btn-text btn-secondary">Enter Stream →</button>
                </div>
            </div>

            <!-- Exam 2 -->
            <div class="card">
                <div class="card-header">
                    <div class="exam-info">
                        <span class="exam-class">BBA Section C</span>
                        <h2 class="exam-title">Financial Accounting Quiz</h2>
                    </div>
                    <div class="badge">
                        <div class="badge-dot"></div>
                        Live
                    </div>
                </div>

                <div class="card-data">
                    <div class="data-item">
                        <span class="data-label">Window</span>
                        <span class="data-value">02:00 PM — 03:30 PM</span>
                    </div>
                    <div class="data-item">
                        <span class="data-label">Keys</span>
                        <span class="data-value highlight">FINACCT</span>
                    </div>
                    <div class="data-item" style="grid-column: span 2;">
                        <span class="data-label">Telemetry Links (28/30)</span>
                        <div class="progress-track">
                            <div class="progress-fill" style="width: 93%;"></div>
                        </div>
                    </div>
                </div>

                <div class="card-actions">
                    <button class="btn-text btn-danger">End Deployment</button>
                    <button class="btn-text btn-secondary">Enter Stream →</button>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
