services:
  - type: web
    name: markaz-backend
    env: python
    region: oregon 
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
